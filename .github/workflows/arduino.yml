name: Arduino Lint

on:
  push:
    branches: []
  pull_request:
    branches: []
  schedule:
    - cron: "0 1 * * 6" # Every Saturday at 1AM

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Arduino Lint
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-lint/main/etc/install.sh -o /tmp/install-arduino-lint.sh
          chmod +x /tmp/install-arduino-lint.sh
          mkdir -p "$RUNNER_TEMP/bin"
          BINDIR="$RUNNER_TEMP/bin" /tmp/install-arduino-lint.sh

      - name: Run Arduino Lint
        run: |
          "$RUNNER_TEMP/bin/arduino-lint" \
            --library-manager update \
            --project-type library \
            --compliance strict