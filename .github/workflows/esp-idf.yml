name: ESP-IDF

on:
  push:
    branches: []
  pull_request:
    branches: []
  schedule:
    - cron: "0 1 * * 6" # Every Saturday at 1AM

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:

  build:
    name: "ESP-IDF ${{ matrix.idf_ver }}"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        idf_ver: ["v4.4.8", "release-v5.4", "release-v6.0"]
        idf_target: ["esp32", "esp32s3"]

    steps:
      - uses: actions/checkout@v6

      - name: Prepare Secret
        run: cp ${{ github.workspace }}/app/examples/esp-idf/main/secrets.h.example ${{ github.workspace }}/app/examples/esp-idf/main/secrets.h

      - name: Compile
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ matrix.idf_ver }}
          target: ${{ matrix.idf_target }}
          path: examples/esp-idf
          command: apt-get update && apt-get install -y python3-venv && idf.py build
