dependencies:
  joltwallet/littlefs: ^1.16.4
  # PsychicHttp REQUIRES the "arduinojson" component but, as a library, no
  # longer declares it itself (its idf_component.yml is disabled so pure-IDF
  # builds don't pull in arduino-esp32). The consuming project must provide it.
  bblanchon/arduinojson: ^7.4.3
  # mdns was a core ESP-IDF component through v4.x, but was moved to the
  # component registry in v5.0. Pull it from the registry only on IDF >= 5.0;
  # on v4.x the bundled core component already provides mdns.h.
  espressif/mdns:
    version: "^1.2.0"
    rules:
      - if: "idf_version >=5.0"
