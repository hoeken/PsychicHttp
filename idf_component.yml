## IDF Component Manager Manifest File
version: "2.1.3"
license: "MIT"
description: "Asyncronous Webserver library for ESP32 + Arduino framework"
url: "https://github.com/hoeken/PsychicHttp"
repository: "https://github.com/hoeken/PsychicHttp"
documentation: "https://github.com/hoeken/PsychicHttp"
tags:
  - webserver
  - websocket
  - http
  - https

dependencies:
  bblanchon/arduinojson: ^7.3.0
  espressif/arduino-esp32:
    matches:
      - if: "idf_version ^4"
        version: "^2"
      - if: "idf_version ^5.1"
        version: "^3.0"
      - if: "idf_version ^5.4"
        version: "3.2.0"
